<!DOCTYPE html>
<html>
<head>
    <title>双路高速感知终端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="top-bar">
        <h1>🚗 CAR</h1>
        <div class="toggle-container">
            <span>双目模式 (Right Cam)</span>
            <label class="switch">
                <input type="checkbox" id="cam-toggle" onchange="toggleRightCam()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    
    <div class="dashboard">
        <div class="dash-metrics">
            <div class="metric-box">
                <div class="metric-label">累计圈数 (Revolutions)</div>
                <div class="metric-value val-pos" id="sensor-pos">0.00</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">瞬时转速 (RPM)</div>
                <div class="metric-value val-spd" id="sensor-speed">0.0</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">瞬时时速 (km/h)</div>
                <div class="metric-value val-kmh" id="sensor-kmh">0.00</div>
                <div class="metric-subvalue">MAX <span id="sensor-max-kmh">0.00</span> km/h</div>
            </div>
        </div>
        <div class="chart-toggle-panel">
            <label class="chart-toggle">
                <span class="toggle-name val-pos">Revolutions</span>
                <span class="switch">
                    <input type="checkbox" class="chart-toggle-input" data-chart-target="pos" checked>
                    <span class="slider"></span>
                </span>
            </label>
            <label class="chart-toggle">
                <span class="toggle-name val-spd">RPM</span>
                <span class="switch">
                    <input type="checkbox" class="chart-toggle-input" data-chart-target="rpm" checked>
                    <span class="slider"></span>
                </span>
            </label>
            <label class="chart-toggle">
                <span class="toggle-name val-kmh">km/h</span>
                <span class="switch">
                    <input type="checkbox" class="chart-toggle-input" data-chart-target="kmh" checked>
                    <span class="slider"></span>
                </span>
            </label>
        </div>
        <div class="charts-container" id="charts-container">
            <div class="chart-box" data-chart-box="pos"><canvas id="posChart"></canvas></div>
            <div class="chart-box" data-chart-box="rpm"><canvas id="speedChart"></canvas></div>
            <div class="chart-box" data-chart-box="kmh"><canvas id="kmhChart"></canvas></div>
        </div>
    </div>

    <div class="container" id="video-container">
        <div class="camera-box single-mode" id="box-left">
            <h3>LEFT CAMERA</h3>
            <img src="/video_feed/left">
            <div class="stats" id="fps-left">FPS: 0.0</div>
        </div>
        <div class="camera-box" id="box-right" style="display: none;">
            <h3>RIGHT CAMERA</h3>
            <img src="/video_feed/right" id="img-right">
            <div class="stats" id="fps-right">STANDBY</div>
        </div>
    </div>
    
    <div class="btn-group">
        <button id="rec-btn" onclick="startRecord()">🔴 记录多源融合数据 (3秒)</button>
    </div>

    <div class="control-panel">
        <h2 style="margin:0; color:#00aaff;">🎮 线控底盘驱动台 (Drive-by-Wire)</h2>
        <div id="rc-warning" style="display: none; background: #cc0000; color: #fff; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; text-align: center; font-size: 1.1em; animation: flash 1.5s infinite;">
            ⚠️ 物理遥控器强制接管中！网页控制已锁定
        </div>

        <div class="joystick-wrapper">
            <div class="throttle-label">前进<br>(Forward)</div>
            <div class="joystick-track" id="joy-track">
                <div class="joystick-center-line"></div>
                <div class="joystick-knob" id="joy-knob"></div>
            </div>
            <div class="throttle-label">倒退<br>(Reverse)</div>
        </div>

        <div class="slider-wrapper">
            <span style="color:#888; font-weight:bold; font-size: 1.1em;">定速巡航: </span>
            <input type="range" id="throttle-slider" min="1000" max="2000" value="1500" step="10">
        </div>
        
        <div>PWM 输出指令: <span id="throttle-val" class="throttle-display">1500</span> <span style="color:#888;">us</span></div>

        <div style="margin-top: 20px; gap: 20px; display: flex; justify-content: center;">
            <button class="btn-neutral" onclick="setThrottle(1500)">归中 (Neutral)</button>
            <button class="btn-estop" onclick="triggerEStop()">🚨 紧急刹车 (E-STOP)</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
